<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCD 3D Viewer</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            color: #fff; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
        }
        
        /* UI Styles */
        #ui-container { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(20, 20, 25, 0.85); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 320px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 1.2rem;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        #status { 
            font-size: 0.9rem;
            font-weight: 500; 
            color: #aaa; 
            margin-bottom: 5px; 
            padding: 8px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        .control-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 6px;
        }
        
        label { 
            font-size: 0.85rem; 
            color: #ddd;
        }

        /* Inputs */
        input[type="file"] { 
            font-size: 0.8rem; 
            background: #2a2a35;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        input[type="file"]::file-selector-button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #6366f1;
        }
        
        input[type="range"] {
            width: 130px;
            cursor: pointer;
        }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        /* Drag and Drop Overlay */
        #drag-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: rgba(79, 70, 229, 0.1); 
            border: 4px dashed #4f46e5; 
            box-sizing: border-box; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 20; 
            pointer-events: none; 
            transition: all 0.2s ease;
        }
        #drag-overlay.active { 
            display: flex; 
            background: rgba(79, 70, 229, 0.2); 
        }
        #drag-overlay span { 
            font-size: 1.5rem; 
            font-weight: bold; 
            background: rgba(20, 20, 25, 0.9); 
            padding: 20px 40px; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            #ui-container {
                width: calc(100% - 40px);
                max-width: none;
                top: auto;
                bottom: 20px;
                max-height: 40vh;
                overflow-y: auto;
            }
        }
    </style>
    <!-- Import map for Three.js e Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- Drag and drop indicator -->
    <div id="drag-overlay"><span>Solte o arquivo .pcd aqui</span></div>
    
    <!-- User Interface -->
    <div id="ui-container">
        <h1>Visualizador PCD</h1>
        <div id="status">Aguardando arquivo...</div>
        
        <div class="control-group">
            <label for="file-input">Selecione ou arraste um arquivo local:</label>
            <input type="file" id="file-input" accept=".pcd">
        </div>

        <div class="control-row">
            <label for="point-size">Tamanho do Ponto</label>
            <input type="range" id="point-size" min="0.001" max="1" step="0.001" value="0.05">
        </div>

        <div class="control-row">
            <label for="use-original-color">Cor Original do Arquivo</label>
            <input type="checkbox" id="use-original-color" checked>
        </div>

        <div class="control-row" id="color-picker-row" style="opacity: 0.5;">
            <label for="custom-color">Cor Customizada</label>
            <input type="color" id="custom-color" value="#4f46e5" disabled>
        </div>
        
        <div class="control-row">
            <label for="show-grid">Mostrar Grid/Eixos</label>
            <input type="checkbox" id="show-grid" checked>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PCDLoader } from 'three/addons/loaders/PCDLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Variáveis globais
        let scene, camera, renderer, controls;
        let pointCloud;
        let gridHelper, axesHelper;

        // Referências do DOM
        const statusEl = document.getElementById('status');
        const fileInput = document.getElementById('file-input');
        const pointSizeInput = document.getElementById('point-size');
        const useOriginalColorInput = document.getElementById('use-original-color');
        const customColorInput = document.getElementById('custom-color');
        const colorPickerRow = document.getElementById('color-picker-row');
        const showGridInput = document.getElementById('show-grid');
        const dragOverlay = document.getElementById('drag-overlay');

        init();
        animate();

        function init() {
            // Cena principal e cor de fundo
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            // Helpers (Grid e Eixos)
            gridHelper = new THREE.GridHelper(20, 20, 0x555555, 0x222222);
            scene.add(gridHelper);
            axesHelper = new THREE.AxesHelper(10);
            scene.add(axesHelper);

            // Câmera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10000);
            camera.position.set(0, 0, 5);

            // Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controles de câmera (Navegação)
            // OrbitControls já mapeia: Esquerda (Rotate), Scroll (Zoom), Direita (Pan)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            // Tratamento de input de arquivo
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    loadFile(e.target.files[0]);
                }
            });

            // Tratamento de Drag and Drop
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragOverlay.classList.add('active');
            });
            window.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('active');
            });
            window.addEventListener('drop', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('active');
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (file.name.toLowerCase().endsWith('.pcd')) {
                        fileInput.files = e.dataTransfer.files; // Sincroniza o input file
                        loadFile(file);
                    } else {
                        updateStatus("Erro: O arquivo não é um .pcd", "#ff6b6b");
                    }
                }
            });

            // Listeners da interface
            pointSizeInput.addEventListener('input', updatePointCloudMaterial);
            
            useOriginalColorInput.addEventListener('change', (e) => {
                const useOriginal = e.target.checked;
                customColorInput.disabled = useOriginal;
                colorPickerRow.style.opacity = useOriginal ? "0.5" : "1";
                updatePointCloudMaterial();
            });
            
            customColorInput.addEventListener('input', updatePointCloudMaterial);
            
            showGridInput.addEventListener('change', (e) => {
                gridHelper.visible = e.target.checked;
                axesHelper.visible = e.target.checked;
            });
        }

        function updateStatus(text, color = "#aaa") {
            statusEl.textContent = text;
            statusEl.style.color = color;
        }

        async function loadFile(file) {
            updateStatus("Lendo arquivo local...", "#ffd166");

            try {
                // Utiliza API moderna para ler o arquivo diretamente
                const arrayBuffer = await file.arrayBuffer();
                
                updateStatus("Processando nuvem de pontos...", "#ffd166");
                const loader = new PCDLoader();
                
                // PCDLoader.parse() suporta ArrayBuffer
                const points = loader.parse(arrayBuffer);
                
                // Remove objeto anterior se existir
                if (pointCloud) {
                    scene.remove(pointCloud);
                    pointCloud.geometry.dispose();
                    pointCloud.material.dispose();
                }

                pointCloud = points;
                
                // Centralizar a nuvem de pontos
                pointCloud.geometry.computeBoundingBox();
                const boundingBox = pointCloud.geometry.boundingBox;
                const center = new THREE.Vector3();
                boundingBox.getCenter(center);
                // Aplica uma translação na geometria para que o (0,0,0) seja o centro do objeto
                pointCloud.geometry.translate(-center.x, -center.y, -center.z);

                // Ajustar câmera para enquadrar o objeto baseado no seu tamanho
                const size = new THREE.Vector3();
                boundingBox.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                // Distância necessária na câmera (com margem)
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 1.8; 
                
                camera.position.set(0, 0, cameraZ);
                controls.target.set(0, 0, 0); // Foca no centro
                controls.update();

                // Ajuste de granularidade do input de tamanho do ponto proporcional ao objeto
                const initialPointSize = maxDim * 0.005 || 0.05;
                pointSizeInput.max = maxDim * 0.1;
                pointSizeInput.min = maxDim * 0.0001;
                pointSizeInput.step = maxDim * 0.0001;
                pointSizeInput.value = initialPointSize;

                // Adiciona os pontos à cena e atualiza material
                scene.add(pointCloud);
                updatePointCloudMaterial();

                updateStatus("Arquivo carregado com sucesso", "#06d6a0");
            } catch (error) {
                console.error("Erro na leitura ou processamento do arquivo:", error);
                updateStatus("Erro ao abrir o arquivo. Arquivo corrompido ou formato inválido.", "#ff6b6b");
            }
        }

        function updatePointCloudMaterial() {
            if (!pointCloud) return;

            const material = pointCloud.material;
            material.size = parseFloat(pointSizeInput.value);
            
            const useOriginal = useOriginalColorInput.checked;
            
            // O PCDLoader define vertexColors = true se o arquivo tiver dados RGB.
            if (useOriginal && pointCloud.geometry.hasAttribute('color')) {
                material.vertexColors = true;
                // Reseta a cor global para branco pra não afetar as cores dos vértices
                material.color.setHex(0xffffff); 
            } else {
                material.vertexColors = false;
                material.color.set(customColorInput.value);
            }
            
            material.needsUpdate = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Atualiza controles (importante para o damping)
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
