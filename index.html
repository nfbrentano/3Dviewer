<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D Pix Force</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            color: #fff; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
        }
        
        /* UI Styles */
        #ui-container { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(20, 20, 25, 0.85); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 320px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 1.2rem;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        #status { 
            font-size: 0.9rem;
            font-weight: 500; 
            color: #aaa; 
            margin-bottom: 5px; 
            padding: 8px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        .control-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 6px;
        }
        
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }
        
        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: #fff;
            border-bottom: 2px solid #4f46e5;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #progress-container {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
        }

        #progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #06d6a0;
            transition: width 0.1s;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #6366f1;
        }

        .btn-primary:disabled {
            background: #333;
            cursor: not-allowed;
        }
        
        label { 
            font-size: 0.85rem; 
            color: #ddd;
        }

        /* Inputs */
        input[type="file"] { 
            font-size: 0.8rem; 
            background: #2a2a35;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        input[type="file"]::file-selector-button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #6366f1;
        }
        
        input[type="range"] {
            width: 130px;
            cursor: pointer;
        }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        /* Drag and Drop Overlay */
        #drag-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: rgba(79, 70, 229, 0.1); 
            border: 4px dashed #4f46e5; 
            box-sizing: border-box; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 20; 
            pointer-events: none; 
            transition: all 0.2s ease;
        }
        #drag-overlay.active { 
            display: flex; 
            background: rgba(79, 70, 229, 0.2); 
        }
        #drag-overlay span { 
            font-size: 1.5rem; 
            font-weight: bold; 
            background: rgba(20, 20, 25, 0.9); 
            padding: 20px 40px; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            #ui-container {
                width: calc(100% - 40px);
                max-width: none;
                top: auto;
                bottom: 20px;
                max-height: 40vh;
                overflow-y: auto;
            }
        }
    </style>
    <!-- Import map for Three.js e Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- Drag and drop indicator -->
    <!-- Drag and drop indicator -->
    <div id="drag-overlay"><span>Solte o arquivo (.pcd, .ply, .obj) aqui</span></div>
    
    <!-- User Interface -->
    <div id="ui-container">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
            <img src="https://pixforce.com/wp-content/uploads/2023/11/Logotipo-PixForce-02-512x256px.png" alt="Pix Force Logo" style="height: 40px; width: auto;">
            <h1 style="margin: 0;">Visualizador 3D Pix Force</h1>
        </div>
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="showTab('viewer')">Visualizar</button>
            <button class="tab-btn" onclick="showTab('optimizer')">Otimizar (Arquivos Gigantes)</button>
        </div>

        <div id="status">Aguardando arquivo...</div>
        
        <!-- Viewer Tab -->
        <div id="tab-viewer" class="tab-content active">
            <div class="control-group">
                <label for="file-input">Selecione ou arraste um arquivo local:</label>
                <input type="file" id="file-input" accept=".pcd,.ply,.obj">
            </div>

            <div class="control-row">
                <label for="point-size">Tamanho do Ponto</label>
                <input type="range" id="point-size" min="0.001" max="1" step="0.001" value="0.05">
            </div>

            <div class="control-row">
                <label for="use-original-color">Cor Original do Arquivo</label>
                <input type="checkbox" id="use-original-color" checked>
            </div>

            <div class="control-row" id="color-picker-row" style="opacity: 0.5;">
                <label for="custom-color">Cor Customizada</label>
                <input type="color" id="custom-color" value="#4f46e5" disabled>
            </div>
            
            <div class="control-row">
                <label for="show-grid">Mostrar Grid/Eixos</label>
                <input type="checkbox" id="show-grid" checked>
            </div>
        </div>

        <!-- Optimizer Tab -->
        <div id="tab-optimizer" class="tab-content">
            <p style="font-size: 0.8rem; color: #aaa; margin: 0;">Reduza arquivos gigantes (como 10GB+) para versões leves mantendo apenas uma porcentagem dos pontos.</p>
            
            <div class="control-group">
                <label for="opt-file-input">Arquivo para Otimizar (.pcd, .ply):</label>
                <input type="file" id="opt-file-input" accept=".pcd,.ply,.obj">
            </div>

            <div class="control-row">
                <label for="opt-ratio">Manter Pontos</label>
                <select id="opt-ratio" style="background: #2a2a35; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 5px; border-radius: 4px;">
                    <option value="0.001">0.1% (Super Leve)</option>
                    <option value="0.01" selected>1% (Otimizado)</option>
                    <option value="0.05">5% (Balanceado)</option>
                    <option value="0.1">10% (Alta Qualidade)</option>
                    <option value="0.25">25% (Pesado)</option>
                </select>
            </div>

            <button id="start-opt-btn" class="btn-primary">Processar e Salvar Como .PLY</button>

            <div id="progress-container">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span id="progress-status">Processando...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div id="progress-bar-bg">
                    <div id="progress-bar-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PCDLoader } from 'three/addons/loaders/PCDLoader.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Variáveis globais
        let scene, camera, renderer, controls;
        let pointCloud;
        let gridHelper, axesHelper;

        // Referências do DOM
        const statusEl = document.getElementById('status');
        const fileInput = document.getElementById('file-input');
        const pointSizeInput = document.getElementById('point-size');
        const useOriginalColorInput = document.getElementById('use-original-color');
        const customColorInput = document.getElementById('custom-color');
        const showGridInput = document.getElementById('show-grid');
        const dragOverlay = document.getElementById('drag-overlay');

        // Optimizer references
        const optFileInput = document.getElementById('opt-file-input');
        const startOptBtn = document.getElementById('start-opt-btn');
        const optRatioSelect = document.getElementById('opt-ratio');
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const progressStatus = document.getElementById('progress-status');
        const progressPercent = document.getElementById('progress-percent');

        // Tab Management
        window.showTab = function(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`.tab-btn[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        };

        init();
        animate();

        function init() {
            // Cena principal e cor de fundo
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            // Helpers (Grid e Eixos)
            gridHelper = new THREE.GridHelper(20, 20, 0x555555, 0x222222);
            scene.add(gridHelper);
            axesHelper = new THREE.AxesHelper(10);
            scene.add(axesHelper);

            // Câmera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10000);
            camera.position.set(0, 0, 5);

            // Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controles de câmera (Navegação)
            // OrbitControls já mapeia: Esquerda (Rotate), Scroll (Zoom), Direita (Pan)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            // Tratamento de input de arquivo
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    loadFile(e.target.files[0]);
                }
            });

            // Tratamento de Drag and Drop
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragOverlay.classList.add('active');
            });
            window.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('active');
            });
            window.addEventListener('drop', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('active');
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    const ext = file.name.toLowerCase().split('.').pop();
                    if (['pcd', 'ply', 'obj'].includes(ext)) {
                        fileInput.files = e.dataTransfer.files; // Sincroniza o input file
                        loadFile(file);
                    } else {
                        updateStatus("Erro: Formato não suportado. Use .pcd ou .ply", "#ff6b6b");
                    }
                }
            });

            // Listeners da interface
            pointSizeInput.addEventListener('input', updatePointCloudMaterial);
            
            useOriginalColorInput.addEventListener('change', (e) => {
                const useOriginal = e.target.checked;
                customColorInput.disabled = useOriginal;
                colorPickerRow.style.opacity = useOriginal ? "0.5" : "1";
                updatePointCloudMaterial();
            });
            
            customColorInput.addEventListener('input', updatePointCloudMaterial);
            
            showGridInput.addEventListener('change', (e) => {
                gridHelper.visible = e.target.checked;
                axesHelper.visible = e.target.checked;
            });

            // Listener do Otimizador
            startOptBtn.addEventListener('click', startOptimization);
        }

        async function startOptimization() {
            const file = optFileInput.files[0];
            if (!file) {
                alert("Selecione um arquivo primeiro!");
                return;
            }

            const ratio = parseFloat(optRatioSelect.value);
            const fileName = file.name;
            const isPCD = fileName.toLowerCase().endsWith('.pcd');
            const isPLY = fileName.toLowerCase().endsWith('.ply');

            if (!isPCD && !isPLY) {
                alert("O otimizador suporta apenas .pcd e .ply");
                return;
            }

            startOptBtn.disabled = true;
            progressContainer.style.display = 'flex';
            updateProgress(0, "Iniciando...");

            try {
                // Para simplificar e garantir que não trave, vamos ler o arquivo em pedaços (streaming)
                // e criar um Blob de saída.
                const stream = file.stream();
                const reader = stream.getReader();
                const decoder = new TextDecoder();
                
                let processedSize = 0;
                let totalSize = file.size;
                let buffer = "";
                let headerFound = false;
                let pointsFound = 0;
                let pointsWritten = 0;
                let outputChunks = [];
                
                // Cabeçalho básico para o novo arquivo PLY
                let headerText = "ply\nformat ascii 1.0\nelement vertex {{COUNT}}\nproperty float x\nproperty float y\nproperty float z\nend_header\n";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    processedSize += value.length;
                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;

                    // Divide por linhas para processar
                    let lines = buffer.split("\n");
                    // Mantém a última linha incompleta no buffer
                    buffer = lines.pop();

                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;

                        if (!headerFound) {
                            // Pula cabeçalho do arquivo original (PCD ou PLY)
                            if (isPCD && line.startsWith("DATA")) {
                                headerFound = true;
                            } else if (isPLY && line.startsWith("end_header")) {
                                headerFound = true;
                            }
                            continue;
                        }

                        // Processamento de dados (considerando formato ASCII por enquanto para simplicidade)
                        pointsFound++;
                        
                        // Seleção estatística baseada no ratio
                        if (Math.random() < ratio) {
                            // Tenta extrair X Y Z (assume que são as 3 primeiras colunas)
                            const parts = line.split(/\s+/);
                            if (parts.length >= 3) {
                                const x = parseFloat(parts[0]);
                                const y = parseFloat(parts[1]);
                                const z = parseFloat(parts[2]);
                                
                                if (!isNaN(x) && !isNaN(y) && !isNaN(z)) {
                                    outputChunks.push(`${x.toFixed(4)} ${y.toFixed(4)} ${z.toFixed(4)}\n`);
                                    pointsWritten++;
                                }
                            }
                        }
                    }

                    updateProgress((processedSize / totalSize) * 100, `Processados: ${(processedSize / (1024 * 1024)).toFixed(1)}MB`);
                }

                // Finaliza
                const finalHeader = headerText.replace("{{COUNT}}", pointsWritten);
                const blob = new Blob([finalHeader, ...outputChunks], { type: "application/octet-stream" });
                
                // Download
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `otimizado_${fileName.replace(/\.[^/.]+$/, "")}.ply`;
                a.click();
                
                updateProgress(100, "Concluído!");
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    startOptBtn.disabled = false;
                }, 3000);

            } catch (error) {
                console.error("Erro na otimização:", error);
                alert("Erro ao processar o arquivo. Certifique-se de que é um arquivo ASCII (Texto). Arquivos binários pesados requerem uma lógica mais complexa.");
                startOptBtn.disabled = false;
                progressContainer.style.display = 'none';
            }
        }

        function updateProgress(percent, status) {
            progressBarFill.style.width = `${percent}%`;
            progressPercent.textContent = `${Math.round(percent)}%`;
            progressStatus.textContent = status;
        }

        function updateStatus(text, color = "#aaa") {
            statusEl.textContent = text;
            statusEl.style.color = color;
        }

        async function loadFile(file) {
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.nwd')) {
                updateStatus("Erro: Formato NWD não suportado diretamente.", "#ff6b6b");
                alert("O formato .nwd é proprietário da Autodesk e não pode ser lido diretamente no navegador.\n\nPor favor, converta o arquivo para .glb, .gltf ou .ply antes de carregar.");
                return;
            }

            updateStatus("Lendo arquivo local...", "#ffd166");

            try {
                const arrayBuffer = await file.arrayBuffer();
                let geometry;
                let object;
                
                if (fileName.endsWith('.pcd')) {
                    updateStatus("Processando PCD (Nuvem de Pontos)...", "#ffd166");
                    const loader = new PCDLoader();
                    object = loader.parse(arrayBuffer);
                    geometry = object.geometry;
                } else if (fileName.endsWith('.ply')) {
                    updateStatus("Processando PLY...", "#ffd166");
                    const loader = new PLYLoader();
                    geometry = loader.parse(arrayBuffer);
                    
                    // Verifica se o PLY tem faces para decidir entre Mesh ou Points
                    if (geometry.index !== null || (geometry.attributes.position && geometry.attributes.position.count > 0 && geometry.index === null && geometry.attributes.normal)) {
                        // Se tem faces (index) ou parece ser uma malha, cria um Mesh
                        // Nota: PLYLoader.parse retorna BufferGeometry. 
                        // Se não houver faces, geometry.index será null.
                        if (geometry.index !== null) {
                            const material = new THREE.MeshStandardMaterial({ color: 0xcccccc, flatShading: true, side: THREE.DoubleSide });
                            object = new THREE.Mesh(geometry, material);
                            
                            // Adicionar luz se for uma malha, caso contrário ficará preto
                            if (!scene.getObjectByName('main-light')) {
                                const light = new THREE.DirectionalLight(0xffffff, 3);
                                light.position.set(1, 1, 1).normalize();
                                light.name = 'main-light';
                                scene.add(light);
                                const ambientLight = new THREE.AmbientLight(0x404040);
                                scene.add(ambientLight);
                            }
                        } else {
                            // Se não tem faces, trata como nuvem de pontos
                            const material = new THREE.PointsMaterial({ size: 0.05 });
                            object = new THREE.Points(geometry, material);
                        }
                    } else {
                        const material = new THREE.PointsMaterial({ size: 0.05 });
                        object = new THREE.Points(geometry, material);
                    }
                } else if (fileName.endsWith('.obj')) {
                    updateStatus("Processando OBJ...", "#ffd166");
                    const loader = new OBJLoader();
                    // OBJLoader.parse espera uma string (ASCII)
                    const text = new TextDecoder().decode(arrayBuffer);
                    object = loader.parse(text);
                    
                    // Garantir que o OBJ tenha luzes
                    if (!scene.getObjectByName('main-light')) {
                        const light = new THREE.DirectionalLight(0xffffff, 3);
                        light.position.set(1, 1, 1).normalize();
                        light.name = 'main-light';
                        scene.add(light);
                        const ambientLight = new THREE.AmbientLight(0x404040);
                        scene.add(ambientLight);
                    }
                }
                
                // Remove objeto anterior se existir
                if (pointCloud) {
                    scene.remove(pointCloud);
                    if (pointCloud.geometry) pointCloud.geometry.dispose();
                    if (pointCloud.material) {
                        if (Array.isArray(pointCloud.material)) {
                            pointCloud.material.forEach(m => m.dispose());
                        } else {
                            pointCloud.material.dispose();
                        }
                    }
                }

                pointCloud = object; // Pode ser Points, Mesh ou Group
                
                // Centralizar e ajustar escala usando Box3 (mais robusto para Groups)
                const boundingBox = new THREE.Box3().setFromObject(pointCloud);
                const center = new THREE.Vector3();
                boundingBox.getCenter(center);
                
                // Em vez de transladar geometria (que falha em Groups), movemos o objeto
                pointCloud.position.x -= center.x;
                pointCloud.position.y -= center.y;
                pointCloud.position.z -= center.z;
                
                // Ajustar câmera
                const size = new THREE.Vector3();
                boundingBox.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 1.8; 
                
                camera.position.set(0, 0, cameraZ);
                controls.target.set(0, 0, 0);
                controls.update();

                // Ajuste de granularidade para o slider de tamanho de ponto
                const initialPointSize = maxDim * 0.005 || 0.05;
                pointSizeInput.max = maxDim * 0.1;
                pointSizeInput.min = maxDim * 0.0001;
                pointSizeInput.step = maxDim * 0.0001;
                pointSizeInput.value = initialPointSize;

                scene.add(pointCloud);
                updatePointCloudMaterial();

                updateStatus(`Arquivo ${fileName.split('.').pop().toUpperCase()} carregado`, "#06d6a0");
            } catch (error) {
                console.error("Erro no processamento do arquivo:", error);
                updateStatus("Erro ao abrir o arquivo.", "#ff6b6b");
            }
        }

        function updatePointCloudMaterial() {
            if (!pointCloud) return;

            const useOriginal = useOriginalColorInput.checked;
            const customColor = customColorInput.value;
            const pointSize = parseFloat(pointSizeInput.value);

            pointCloud.traverse((child) => {
                if (child.material) {
                    const materials = Array.isArray(child.material) ? child.material : [child.material];
                    
                    materials.forEach(material => {
                        // Se for nuvem de pontos, atualiza o tamanho
                        if (material.size !== undefined) {
                            material.size = pointSize;
                        }

                        // Atualização de cor
                        if (useOriginal && (child.geometry.hasAttribute('color') || material.map)) {
                            // Se tem cores de vértice ou textura, mantém original
                            if (child.geometry.hasAttribute('color')) {
                                material.vertexColors = true;
                                material.color.setHex(0xffffff);
                            }
                        } else {
                            material.vertexColors = false;
                            material.color.set(customColor);
                        }
                        material.needsUpdate = true;
                    });
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Atualiza controles (importante para o damping)
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
